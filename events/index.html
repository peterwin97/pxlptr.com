<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0c" />
<meta name="robots" content="noindex, nofollow" />
<title>Event Hub — PXLPTR</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="dash.css" />
</head>
<body>

<!-- PASSWORD GATE -->
<div id="gate">
  <div class="gate-inner">
    <div class="gate-brand">PXLPTR</div>
    <h1 class="gate-event" id="gateEventName"></h1>
    <p class="gate-sub" id="gateEventSub"></p>
    <form class="gate-form" id="gateForm">
      <input class="gate-input" type="password" id="gatePass" placeholder="Access code" autocomplete="off" />
      <button class="gate-btn" type="submit">Enter</button>
    </form>
    <p class="gate-error" id="gateError"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash" class="hidden">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-top">
      <div class="sb-brand">PXLPTR</div>
      <div class="sb-event" id="sbEvent"></div>
      <div class="sb-meta" id="sbMeta"></div>
    </div>
    <nav class="sb-nav">
      <a href="#overview" class="sb-link active" data-section="overview">Overview</a>
      <a href="#venue" class="sb-link" data-section="venue">Venue</a>
      <a href="#announcements" class="sb-link" data-section="announcements">Updates</a>
      <a href="#contacts" class="sb-link" data-section="contacts">Contacts</a>
      <a href="#schedule" class="sb-link" data-section="schedule">Schedule</a>
      <a href="#files" class="sb-link" data-section="files">Files</a>
    </nav>
    <div class="sb-footer">
      <div class="sb-weather" id="sbWeather"></div>
    </div>
  </aside>

  <!-- MOBILE TOP BAR -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-brand">PXLPTR</span>
      <span class="topbar-sep">·</span>
      <span class="topbar-event" id="topbarEvent"></span>
    </div>
    <button class="topbar-hamburger" id="menuToggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- CONTENT -->
  <main class="content">

    <!-- OVERVIEW -->
    <section class="panel" id="overview">
      <div class="panel-head">
        <h2 class="panel-title">Overview</h2>
        <span class="panel-countdown" id="countdown"></span>
      </div>
      <div class="overview-grid">
        <div class="ov-card ov-card--event">
          <div class="ov-label">Event</div>
          <div class="ov-value ov-value--lg" id="ovEvent"></div>
          <div class="ov-sub" id="ovSub"></div>
        </div>
        <div class="ov-card">
          <div class="ov-label">Date</div>
          <div class="ov-value" id="ovDate"></div>
        </div>
        <div class="ov-card">
          <div class="ov-label">Venue</div>
          <div class="ov-value" id="ovVenue"></div>
          <a class="ov-link" id="ovMap" href="#" target="_blank">Open in Maps ↗</a>
        </div>
        <div class="ov-card">
          <div class="ov-label">Weather</div>
          <div class="ov-value" id="ovWeather">Loading...</div>
        </div>
      </div>
    </section>

    <!-- VENUE -->
    <section class="panel" id="venue">
      <div class="panel-head">
        <h2 class="panel-title">Venue</h2>
      </div>
      <div class="venue-grid" id="venueGrid"></div>
    </section>

    <!-- ANNOUNCEMENTS -->
    <section class="panel" id="announcements">
      <div class="panel-head">
        <h2 class="panel-title">Updates</h2>
        <span class="panel-count" id="annCount"></span>
      </div>
      <div class="ann-list" id="annList"></div>
    </section>

    <!-- CONTACTS -->
    <section class="panel" id="contacts">
      <div class="panel-head">
        <h2 class="panel-title">Contacts</h2>
      </div>
      <div class="filter-bar" id="contactFilters"></div>
      <div class="contact-grid" id="contactGrid"></div>
    </section>

    <!-- SCHEDULE -->
    <section class="panel" id="schedule">
      <div class="panel-head">
        <h2 class="panel-title">Schedule</h2>
      </div>
      <div class="filter-bar" id="scheduleTabs"></div>
      <table class="sched-table">
        <thead>
          <tr><th class="sched-th">Time</th><th class="sched-th">Description</th><th class="sched-th sched-th--dept">Dept</th></tr>
        </thead>
        <tbody id="schedBody"></tbody>
      </table>
    </section>

    <!-- FILES -->
    <section class="panel" id="files">
      <div class="panel-head">
        <h2 class="panel-title">Files</h2>
      </div>
      <div class="filter-bar" id="fileFilters"></div>
      <table class="file-table">
        <thead>
          <tr><th class="file-th">Name</th><th class="file-th">Category</th><th class="file-th">Size</th><th class="file-th"></th></tr>
        </thead>
        <tbody id="fileBody"></tbody>
      </table>
    </section>

  </main>
</div>

<script src="dash.js"></script>
</body>
</html>
